name: Frontend Deploy (Next.js)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'front-end/**'
      - '.github/workflows/front-deploy.yml'

jobs:
  deploy-front:
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드 내려받기
        uses: actions/checkout@v3

      - name: Node.js 세팅
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: 의존성 설치 & 빌드
        run: |
          cd front-end
          npm ci
          npm run build

      - name: 결과물 서버로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }} 
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          source: "front-end/out/*"
          target: "/var/www/html/life-hub/"
          strip_components: 2

      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "🎨 프론트엔드(Next.js) 배포 결과"
          description: "프론트엔드 변경사항 배포가 종료되었습니다! 결과: ${{ job.status }}"
          color: ${{ job.status == 'success' && 0x3498db || 0xff0000 }} 
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
      - name: 🚨 Notify OpenClaw on Failure
        if: failure()
        run: |
          curl -X POST "https://suhyun444.duckdns.org/webhook/hooks/github-ci" \
          -H "Content-Type: application/json" \
          -d '{"run_id": "${{ github.run_id }}"}'